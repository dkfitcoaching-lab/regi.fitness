<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e16"/>
      <stop offset="50%" stop-color="#08080c"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="30%" stop-color="#d4a44a"/>
      <stop offset="60%" stop-color="#c49838"/>
      <stop offset="100%" stop-color="#a87828"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c49838" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d4a44a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a87828" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#d4a44a" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#d4a44a" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  <!-- Ambient glow behind letter -->
  <rect width="512" height="512" fill="url(#glowBg)"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="2" ry="2" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>
  <!-- Gold R Letter with glow -->
  <text x="256" y="330" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="280" font-weight="700" fill="url(#goldGrad)" filter="url(#glow)">R</text>
  <!-- Thin gold line accent -->
  <rect x="140" y="385" width="232" height="1.5" rx="1" fill="url(#goldGrad)" opacity="0.4"/>
</svg>
