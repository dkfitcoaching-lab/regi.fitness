// Supabase
function supaFetch(path,method,body){method=method||"GET";var token=LS.get("accessToken",null)||SUPA_KEY;var h={"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":"Bearer "+token};if(method==="POST")h["Prefer"]="resolution=merge-duplicates,return=minimal";if(method==="DELETE")h["Prefer"]="return=minimal";var opts={method:method,headers:h};if(body)opts.body=JSON.stringify(body);return fetch(SUPA_URL+"/rest/v1/"+path,opts).then(function(r){if(r.status===204||r.status===201)return{};if(r.ok)return r.json().catch(function(){return{};});return r.json().then(function(e){throw e;});});}
async function syncToCloud(){var tid=LS.get("userId",null);if(!tid)return;_syncStatus="syncing";updateSyncBadge();try{await refreshAccessToken();await supaFetch("trainers","POST",[{id:tid,email:LS.get("userEmail",""),gym_cut:Math.round(getGymCut()*100),default_rate:parseInt(LS.get("defaultRate","70"))}]);var tag={trainer_id:tid};var tasks=[];if(clients.length)tasks.push(supaFetch("clients","POST",clients.map(function(c){return Object.assign({},c,tag);})));if(sessions.length)tasks.push(supaFetch("sessions","POST",sessions.map(function(s){return Object.assign({},s,tag,{exercises:s.exercises||[]});})));if(schedule.length)tasks.push(supaFetch("schedule","POST",schedule.map(function(s){return Object.assign({},s,tag);})));await Promise.all(tasks);_syncStatus="ok";LS.set("lastSync",new Date().toISOString());}catch(e){console.warn("Sync:",e);_syncStatus="error";}updateSyncBadge();}
async function syncFromCloud(){var tid=LS.get("userId",null);if(!tid)return;_syncStatus="syncing";updateSyncBadge();try{await refreshAccessToken();var res=await Promise.all([supaFetch("clients?trainer_id=eq."+tid+"&order=created_at.asc"),supaFetch("sessions?trainer_id=eq."+tid+"&order=created_at.asc"),supaFetch("schedule?trainer_id=eq."+tid+"&order=created_at.asc")]);if(Array.isArray(res[0])){clients=res[0];LS.set("clients",res[0]);}if(Array.isArray(res[1])){sessions=res[1];LS.set("sessions",res[1]);}if(Array.isArray(res[2])){schedule=res[2];LS.set("schedule",res[2]);}LS.set("lastSync",new Date().toISOString());_syncStatus="ok";}catch(e){console.warn("SyncFromCloud:",e);_syncStatus="error";}updateSyncBadge();}
async function cloudDelete(table,id){var tid=LS.get("userId",null);if(!tid)return;try{await supaFetch(table+"?id=eq."+id+"&trainer_id=eq."+tid,"DELETE");}catch(e){}}
function updateSyncBadge(){var icons={idle:"\u25CB",syncing:"\u21BB",ok:"\u25CF",error:"\u25CB"};var colors={idle:"var(--dm)",syncing:"var(--acc)",ok:"var(--success)",error:"var(--dm)"};var titles={idle:"Not synced",syncing:"Syncing...",ok:"Synced",error:"Sync unavailable"};var icon=icons[_syncStatus]||"\u25CB";var color=colors[_syncStatus]||"var(--dm)";["syncBadge","syncBadge2"].forEach(function(id){var el=document.getElementById(id);if(!el)return;el.textContent=icon;el.style.color=color;el.title=titles[_syncStatus]||"";});}

// Utils
function $(id){return document.getElementById(id);}

function toast(m,dur){document.querySelectorAll(".toast").forEach(function(t){t.remove();});var d=document.createElement("div");d.className="toast";d.textContent=m;document.body.appendChild(d);haptic(15);setTimeout(function(){d.remove();},dur||2400);}
function fmtTime(s){var m=Math.floor(s/60),ss=s%60;return(m<10?"0"+m:m)+":"+(ss<10?"0"+ss:ss);}
function fmtDate(iso){if(!iso)return"\u2014";var d=new Date(iso+"T12:00:00");return(d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();}
function is24Hr(){return LS.get("timeFormat","12")==="24";}
function fmtTimeStr(t){if(!t)return"TBD";var p=t.split(":");var hr=parseInt(p[0]);if(is24Hr())return(hr<10?"0"+hr:hr)+":"+p[1];var ampm=hr>=12?"PM":"AM";var h12=hr===0?12:hr>12?hr-12:hr;return h12+":"+p[1]+" "+ampm;}
function toLocalISO(d){var y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();return y+"-"+(m<10?"0"+m:m)+"-"+(day<10?"0"+day:day);}
function todayISO(){return toLocalISO(new Date());}

function escJs(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,'\\"');}

async function refreshAccessToken(){var rt=LS.get("refreshToken",null);if(!rt)return false;try{var r=await fetch(SUPA_URL+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPA_KEY},body:JSON.stringify({refresh_token:rt})});var d=await r.json();if(d.access_token){LS.set("accessToken",d.access_token);if(d.refresh_token)LS.set("refreshToken",d.refresh_token);return true;}}catch(e){}return false;}
function signOut(){LS.set("userId",null);LS.set("accessToken",null);LS.set("refreshToken",null);clients=[];sessions=[];schedule=[];LS.set("clients",[]);LS.set("sessions",[]);LS.set("schedule",[]);sessionStorage.removeItem("regi_unlocked");showAuthScreen();}
function isLoggedIn(){return!!LS.get("userId",null);}
function getCoachName(){return LS.get("coachName","Coach");}
function showAuthScreen(){var app=$("app");if(app)app.style.display="none";var el=$("authScreen");if(!el){el=document.createElement("div");el.id="authScreen";document.body.appendChild(el);}el.style.cssText="position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px";el.innerHTML='<div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(212,164,74,0.06),transparent 60%);pointer-events:none"></div><div style="position:relative;width:100%;max-width:340px"><div style="text-align:center;margin-bottom:36px"><div style="width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#0e0e14,#1a1a24);border:1px solid var(--borderH);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:38px;font-weight:900;color:var(--acc);box-shadow:0 0 60px var(--accGlow);animation:breathe 4s ease-in-out infinite;margin:0 auto 20px">R</div><div style="font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:0.12em;color:var(--ice)">REGI</div><div style="font-size:9px;color:var(--dm);font-family:var(--mono);letter-spacing:0.2em;margin-top:4px">COACHING STUDIO</div></div><div style="display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden"><div onclick="switchAuthTab(\'signin\')" id="tabSignin" style="flex:1;padding:10px;text-align:center;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.1em;cursor:pointer;background:rgba(212,164,74,0.1);color:var(--acc)">SIGN IN</div><div onclick="switchAuthTab(\'signup\')" id="tabSignup" style="flex:1;padding:10px;text-align:center;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.1em;cursor:pointer;color:var(--dm)">CREATE ACCOUNT</div></div><div id="authSignin"><div style="margin-bottom:12px"><input id="siEmail" type="email" placeholder="Email" autocomplete="email"></div><div style="margin-bottom:16px"><input id="siPass" type="password" placeholder="Password" autocomplete="current-password"></div><button class="btn" onclick="doSignIn()" id="siBtn">SIGN IN</button></div><div id="authSignup" style="display:none"><div style="margin-bottom:12px"><input id="suName" type="text" placeholder="Your name"></div><div style="margin-bottom:12px"><input id="suEmail" type="email" placeholder="Email" autocomplete="email"></div><div style="margin-bottom:16px"><input id="suPass" type="password" placeholder="Password (min 6 chars)" autocomplete="new-password"></div><button class="btn" onclick="doSignUp()" id="suBtn">CREATE ACCOUNT</button></div><div id="authError" style="margin-top:12px;text-align:center;font-size:11px;color:var(--danger);font-family:var(--mono);min-height:18px"></div></div>';setTimeout(function(){var e=$("siEmail");if(e){e.focus();e.addEventListener("keydown",function(ev){if(ev.key==="Enter")doSignIn();});}var p=$("siPass");if(p)p.addEventListener("keydown",function(ev){if(ev.key==="Enter")doSignIn();});var sp=$("suPass");if(sp)sp.addEventListener("keydown",function(ev){if(ev.key==="Enter")doSignUp();});},100);}

// AUTO-REMINDER SYSTEM
function getAutoReminderQueue(){
if(!LS.get("autoReminder",false))return[];
var hrs=LS.get("autoReminderHrs",24);
var now=new Date(),results=[];
schedule.forEach(function(s){
if(s.status==="complete"||s.status==="cancelled"||!s.time||!s.date)return;
var sessDate=new Date(s.date+"T"+s.time+":00");
var diff=(sessDate-now)/(1000*60*60);
if(diff>0&&diff<=hrs){
var key="autoSent_"+s.id+"_"+s.date;
if(!LS.get(key,false))results.push(s);
}
});
return results.sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);});
}
var _autoReminderInterval=null;
function initAutoReminders(){
if(_autoReminderInterval)clearInterval(_autoReminderInterval);
if(!LS.get("autoReminder",false))return;
_autoReminderInterval=setInterval(checkAutoReminders,120000);
checkAutoReminders();
}
function checkAutoReminders(){
if(!LS.get("autoReminder",false)||isQuietHours())return;
var queue=getAutoReminderQueue();
if(!queue.length)return;
var s=queue[0];
var key="autoPrompt_"+s.id+"_"+s.date;
if(sessionStorage.getItem(key))return;
sessionStorage.setItem(key,"1");
// Show a toast prompt and auto-open the send dialog
toast(IC.clock+" Time to remind "+s.clientName+" about their session!");
setTimeout(function(){sendClientReminder(s.id);},1500);
}
function markAutoReminderSent(schedId){
var s=schedule.find(function(x){return x.id===schedId;});
if(s)LS.set("autoSent_"+s.id+"_"+s.date,true);
}

function sendReminderToClient(clientId){
var c=clientById(clientId);if(!c)return;
var template=(c&&c.reminderMsg)?c.reminderMsg:LS.get("reminderTemplate",t("defaultReminder"));
var nextSched=schedule.filter(function(s){return s.clientId===clientId&&s.date>=todayISO()&&s.status!=="cancelled"&&s.status!=="complete";}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);})[0];
var msg=template.replace(/\{name\}/g,c.name||"").replace(/\{time\}/g,nextSched?fmtTimeStr(nextSched.time):"your next session").replace(/\{type\}/g,nextSched?(nextSched.type||"Training"):(c.type||"Training")).replace(/\{date\}/g,nextSched?fmtDate(nextSched.date):"soon");
if(c.phone&&/Mobi|Android|iPhone/i.test(navigator.userAgent)){window.open("sms:"+encodeURIComponent(c.phone)+"?body="+encodeURIComponent(msg),"_blank");toast("\u2713 Opening messages...");}
else{navigator.clipboard.writeText(msg).then(function(){toast("\u2713 Reminder copied to clipboard");}).catch(function(){var ta=document.createElement("textarea");ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();toast("\u2713 Reminder copied");});}}
function sendClientReminder(schedId){
var sched=schedule.find(function(s){return s.id===schedId;});
if(!sched)return;
markAutoReminderSent(schedId);
var c=clientById(sched.clientId);
var template=(c&&c.reminderMsg)?c.reminderMsg:LS.get("reminderTemplate",t("defaultReminder"));
var msg=template.replace(/\{name\}/g,c?c.name:sched.clientName||"").replace(/\{time\}/g,fmtTimeStr(sched.time)).replace(/\{type\}/g,sched.type||"Training").replace(/\{date\}/g,fmtDate(sched.date));
// Try SMS on mobile, fallback to clipboard
if(c&&c.phone&&/Mobi|Android|iPhone/i.test(navigator.userAgent)){
window.open("sms:"+encodeURIComponent(c.phone)+"?body="+encodeURIComponent(msg),"_blank");
toast("\u2713 Opening messages...");
}else{
navigator.clipboard.writeText(msg).then(function(){toast("\u2713 Reminder copied to clipboard");}).catch(function(){
var ta=document.createElement("textarea");ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();toast("\u2713 Reminder copied");
});}}

function safePDFSave(doc,fileName){
try{
var blob=doc.output('blob');
var file=new File([blob],fileName,{type:'application/pdf'});
// Try Web Share API first (best for iOS — saves directly to Files/Books)
if(navigator.canShare&&navigator.canShare({files:[file]})){
navigator.share({files:[file],title:fileName.replace('.pdf','').replace(/_/g,' ')}).then(function(){
toast('\u2713 PDF shared successfully');
}).catch(function(err){
if(err.name!=='AbortError'){_pdfFallbackSave(blob,fileName);}
});return;}
// Desktop or non-share browsers
if(!navigator.userAgent.match(/iPhone|iPad|iPod/i)){
var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fileName;a.style.display='none';document.body.appendChild(a);a.click();
setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);
toast('\u2713 PDF downloaded');return;}
// iOS fallback — open in new tab for manual save
_pdfFallbackSave(blob,fileName);
}catch(e){try{doc.save(fileName);toast('\u2713 PDF downloaded');}catch(e2){toast('PDF error: '+e2.message);}}
}
function _pdfFallbackSave(blob,fileName){
var url=URL.createObjectURL(blob);
window.open(url,'_blank');
toast('\u2713 PDF opened \u2014 tap Share then Save to Files');
}

function foodByIdx(idx,name){var foods=getAllFoods();var fd=foods[idx];if(fd&&(!name||fd.n===name))return fd;if(name){for(var i=0;i<foods.length;i++){if(foods[i].n===name)return foods[i];}}return fd;}
function addFoodToMeal(idx){
var foods=getAllFoods();var fd=foods[idx];if(!fd)return;
if(!_mealData[_currentMealSlot])_mealData[_currentMealSlot]=[];

renderMealSlotItems(_currentMealSlot);updateMacroTotals();
// Advance to next meal if desired
var mc=parseInt(($('mpMealCount')||{}).value||"4");
toast('\u2713 '+fd.n+' \u2192 '+t("meal")+' '+_currentMealSlot);
haptic(8);}

function updateMealServing(slot,idx,val){if(!_mealData[slot]||!_mealData[slot][idx])return;_mealData[slot][idx].servings=parseFloat(val)||1;renderMealSlotItems(slot);updateMacroTotals();}
function removeMealItem(slot,idx){if(!_mealData[slot])return;_mealData[slot].splice(idx,1);renderMealSlotItems(slot);updateMacroTotals();}

function updateMacroTotals(){
var tp=0,tc=0,tf=0,tcal=0;var hasVeg=false,hasFiber=false;
Object.keys(_mealData).forEach(function(slot){(_mealData[slot]||[]).forEach(function(it){var fd=foodByIdx(it.idx,it.name);if(!fd)return;var s=it.servings;tp+=fd.p*s;tc+=fd.c*s;tf+=fd.f*s;tcal+=fd.cal*s;if(fd.cat==='veggie')hasVeg=true;if(fd.n&&fd.n.toLowerCase().indexOf('fiber')>=0||fd.n&&fd.n.toLowerCase().indexOf('psyllium')>=0)hasFiber=true;});});
var elP=$('totP'),elC=$('totC'),elF=$('totF'),elCal=$('totCal');
if(elP)elP.textContent=Math.round(tp)+'g';
if(elC)elC.textContent=Math.round(tc)+'g';
if(elF)elF.textContent=Math.round(tf)+'g';
if(elCal)elCal.textContent=Math.round(tcal);
// Target comparison and guardrails
var targP=parseInt(v('mpTargP'))||0,targC=parseInt(v('mpTargC'))||0,targF=parseInt(v('mpTargF'))||0;
var warnings=[];
if(targP&&Math.round(tp)<targP*0.9)warnings.push('Protein is '+Math.round(targP-tp)+'g below target');
if(targP&&Math.round(tp)>targP*1.1)warnings.push('Protein is '+Math.round(tp-targP)+'g over target');
if(targC&&Math.round(tc)<targC*0.9)warnings.push('Carbs are '+Math.round(targC-tc)+'g below target');
if(targF&&Math.round(tf)<targF*0.85)warnings.push('Fat is '+Math.round(targF-tf)+'g below target');
if(tcal>0&&!hasVeg)warnings.push('No vegetables added \u2014 consider adding greens for micronutrients');
if(tcal>0&&tf<15)warnings.push('Fat is very low \u2014 minimum ~20g needed for hormone function');
if(tcal>0&&tp<50)warnings.push('Protein is very low for a coached client');
var wEl=$('macroWarnings');if(!wEl){wEl=document.createElement('div');wEl.id='macroWarnings';var totals=$('macroTotals');if(totals)totals.parentElement.appendChild(wEl);}
if(warnings.length){wEl.innerHTML='<div style="margin-top:10px;padding:10px 14px;background:rgba(232,184,120,0.06);border:1px solid rgba(232,184,120,0.18);border-radius:8px">'+warnings.map(function(w){return'<div style="font-size:10px;color:var(--warn);font-family:var(--mono);line-height:1.8"><span style="display:inline-flex;vertical-align:middle;color:var(--warn)">'+IC.warn+'</span>'+w+'</div>';}).join('')+'</div>';}else{wEl.innerHTML='';}}

function saveCardioProtocol(clientId){

var selections=[];
for(var i=0;i<CARDIO_OPTIONS.length;i++){var chk=$('cardioChk'+i);if(chk&&chk.checked){selections.push({equipment:CARDIO_OPTIONS[i].n,mode:v('cardioMode'+i)||CARDIO_OPTIONS[i].modes[0],duration:parseInt(v('cardioDur'+i))||CARDIO_OPTIONS[i].defDur});}}
if(!selections.length){toast(t("selectAtLeastOne"));return;}
var plan={id:Date.now().toString(),clientId:clientId,name:name,phase:v('cardioPhase')||'Off-Season',frequency:v('cardioFreq')||'4',timing:v('cardioTiming')||'Post-Training',targetBPM:v('cardioBPM')||'',selections:selections,notes:v('cardioNotes')||'',createdAt:new Date().toISOString()};

function renderCardioDetail(){

var totalMin=0;

// Notes

doc.setFillColor(22,22,30);doc.roundedRect(M,y,W-M*2,28,4,4,"F");
doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(gold[0],gold[1],gold[2]);doc.text("NOTES",M+10,y+12);

function calcQuickTotals(){
var raw=v('qcAmounts')||'';
var nums=raw.replace(/\n/g,',').split(',').map(function(s){return parseFloat(s.trim());}).filter(function(n){return!isNaN(n)&&n>0;});
var results=$('qcResults');
if(!nums.length){if(results)results.style.display='none';return;}
if(results)results.style.display='block';
var gross=nums.reduce(function(a,b){return a+b;},0);
var cutPct=parseInt(v('qcCut'))||20;
var taxPct=parseInt(v('qcTax'))||20;
var gymCut=Math.round(gross*cutPct/100);
var afterCut=gross-gymCut;
var taxAmt=Math.round(afterCut*taxPct/100);
var net=afterCut-taxAmt;
var elG=$('qcGross'),elC=$('qcGymCut'),elT=$('qcTaxAmt'),elN=$('qcNet'),elB=$('qcBreakdown');
if(elG)elG.textContent='$'+roundMoney(gross);
if(elC)elC.textContent='-$'+gymCut;
if(elT)elT.textContent='-$'+taxAmt;
if(elN)elN.textContent='$'+roundMoney(net);
if(elB)elB.innerHTML=nums.length+' sessions totaling $'+roundMoney(gross)+'<br>Gym keeps $'+gymCut+' ('+cutPct+'%) \u2192 You earn $'+roundMoney(afterCut)+'<br>Set aside $'+taxAmt+' ('+taxPct+'%) for taxes \u2192 Take-home: $'+roundMoney(net)+'<br>Per session avg: $'+roundMoney(gross/nums.length)+' gross / $'+roundMoney(net/nums.length)+' net';}

// GUIDE - Empowering, professional tone
var GUIDE_DATA=[
{t:"MINDSET",items:[
{t:"You Are the Professional",d:"By the time a client books with you, they've already decided they need what you offer. Your preparation and confidence set the tone for everything. Own that."},
{t:"Meet Them Where They Are",d:"Most clients show up carrying some uncertainty about themselves. Your job is to acknowledge that honestly, then redirect their focus toward what they CAN do right now."},
{t:"Be the Best Part of Their Day",d:"For many people, this session is the only hour that exists entirely for them. Your consistent energy creates a reliable, safe environment they look forward to."},
{t:"Listen First",d:"Ask thoughtful questions, then actually listen. People will tell you everything you need to know about their goals, fears, and motivations if you give them space to talk."},
{t:"Celebrate the Wins",d:"The first time someone does something they didn't think they could, make it a moment. Be genuinely excited about their progress \u2014 sometimes more than they are."},
{t:"Motivation vs Discipline",d:"Motivation fades \u2014 that's normal. Your role is helping clients build discipline, which is a trainable skill. Every time they follow through on something they didn't feel like doing, that pathway gets stronger. Small consistent actions compound into real change."},
{t:"Goal Setting That Works",d:"Break big goals into actionable pieces. A 50-pound loss goal can feel paralyzing \u2014 losing 2 pounds this week is achievable. One well-built meal out of three is already 33% improvement. Help them see the progress that's already happening."}
]},
{t:"ONBOARDING",items:[
{t:"Consultation Call",d:"Find out where they're starting, what they want and why, any injuries or limitations, and their availability. Listen more than you talk. If they're on the fence, offer a complimentary first session to show them what working with you feels like."},
{t:"Pricing Structure",d:"Starting rate: $1/min. Additional services you can offer: custom meal plans ($100-150), tailored programming ($100-150). Flexible payment options: per session, weekly, monthly, or discounted 3-month blocks."},
{t:"Cancellation Policy",d:"24-hour notice for cancellations \u2014 communicate this clearly from day one. You can absolutely be understanding about emergencies, but patterns of last-minute cancellations need to be addressed directly and professionally."},
{t:"Payment",d:"Cash preferred. Venmo as a gift transaction to avoid fees. Route everything through your business account and track deductible expenses. Gym split: 20% within the first 5 days of the following month."},
{t:"First Session Setup",d:"Location: Old School Iron, Brook Park OH. Last door on the far right. New clients should arrive 15 minutes early. Non-members sign a waiver on the iPad at the front."},
{t:"First Session Flow",d:"Walk them in, give a quick tour, keep the conversation natural. Re-confirm their primary goal, explain in simple terms what you'll do together, then get moving. End by highlighting one specific thing they did well \u2014 something concrete, not generic."}
]},
{t:"SESSION FLOW",items:[
{t:"The 60-Minute Framework",d:"0-5 min: genuine check-in (how they're feeling, sleep, stress). 5-12: dynamic warm-up. 12-15: pre-activation for target muscles. 15-45: main training block. 45-55: mobility and stretching. 55-60: close out with one specific, concrete piece of praise about what they did today."},
{t:"Upper Body Warm-Up",d:"2.5-5 lb plate: front raises, lateral raises, bent-over rear delt flyes. Band internal/external rotations. Keep it under 5 minutes \u2014 the goal is blood flow and activation, not fatigue."},
{t:"Lower Body Warm-Up",d:"Hip circles, leg swings, bodyweight squats, glute bridges, banded abductions. Light RDL to prime the hinge. Consider opening with calves for blood flow near the knee joint \u2014 especially for clients with knee history."},
{t:"Main Block Structure",d:"Never start heavy compounds cold. Build through pre-activation work first. General structure: isolation \u2192 primary compound \u2192 secondary compound \u2192 finisher. This protects joints and builds confidence through the session."},
{t:"Circuit Design",d:"2-4 exercises back-to-back, rest after the full round. This is your best tool for fat loss clients \u2014 keeps heart rate elevated while maintaining training stimulus. Program complementary movement patterns (push/pull, upper/lower)."},
{t:"Closing the Session",d:"End every session by calling out one specific, real moment from the workout. Not 'great job' \u2014 something like 'that third set of RDLs, your hip hinge was noticeably better than last week.' Specificity builds trust."},
{t:"When They're Sick",d:"Above the neck only (congestion, runny nose): train with modifications, lower intensity. Below the neck (fever, chest congestion, body aches): reschedule. Their body needs recovery, not stress."}
]},
{t:"PROGRAMMING",items:[
{t:"Rep Ranges",d:"Strength: 3-6 reps, 2-3 min rest. Hypertrophy: 6-12 reps, 60-90s rest. Endurance: 12-20 reps, 30-45s rest. Fat loss circuits: 10-15 reps, 30-45s between rounds."},
{t:"Starting Weight Selection",d:"Take your best estimate and cut it in half. A lighter opener reveals movement mechanics and builds early confidence. Weight can always increase \u2014 an injury from going too heavy too soon costs weeks."},
{t:"Pre-Activation vs Pre-Exhaustion",d:"Pre-activation: light isolation before compounds for blood flow and mind-muscle connection. NOT meant to fatigue. Pre-exhaustion: working sets on isolation before compounds, intentionally fatiguing the target. Best for experienced clients, cuts, and joint-friendly programming."},
{t:"Progressive Overload Ladder",d:"Progress in this order: form quality \u2192 full range of motion \u2192 more reps \u2192 slower tempo \u2192 more volume \u2192 shorter rest \u2192 heavier load \u2192 exercise complexity. Most clients try to jump straight to load. Guide them through the ladder."},
{t:"Intensifiers",d:"Drop set: hit failure, reduce weight ~20%, continue. Rest-pause: hit failure, rest 15-20s, squeeze out more. Forced reps: assist 2-3 reps past failure. Slow negatives: 5-8 second eccentric. Use these strategically \u2014 they're powerful but recovery-demanding."},
{t:"Sled Work",d:"Reverse drags: outstanding for tibialis and knee health. Forward pushes: upper body and cardio combined. Pulls: posterior chain focus. Sled work can effectively replace traditional cardio for fat loss clients while building strength."}
]},
{t:"CLIENT TYPES",items:[
{t:"Your Decision Framework",d:"For every client, every session, ask: What's the goal? What limits them today? What's contraindicated? What alternatives exist? What does success look like for THIS session?"},
{t:"Beginners",d:"Movement quality is everything. Focus on compound patterns with simple cues (one or two per movement, max). Keep intensity at RPE 7 or below. Start weights at half your estimate. Address nutrition conversations early \u2014 they're most receptive at the beginning."},
{t:"Intermediate Clients",d:"Tracked week-over-week progress builds trust and accountability. Program push/pull/legs or upper/lower splits, minimum 3x/week. You can start introducing intensifiers around session 3-4 once they've demonstrated good form consistency."},
{t:"Advanced Clients",d:"These clients typically seek specificity, accountability, or a fresh perspective. Identify lagging areas and build focused blocks. Higher volume, shorter rest periods, frequent intensifiers. They know their bodies \u2014 collaborate with them on programming."},
{t:"Fat Loss Focus",d:"Nutrition is the primary driver of fat loss \u2014 you can guide them on building better eating habits with practical, sustainable approaches. In the gym: circuits, sled work, short rest periods. Replace and improve rather than restrict and deprive."},
{t:"Older Adults",d:"Always extend the warm-up. Sled work and calf raises first for blood flow. Belt squats are your go-to compound \u2014 spinal loading without spinal compression. Never start cold on heavy compounds. Progress load gradually and celebrate consistency."},
{t:"Working Around Injuries",d:"Strengthen the surrounding structures before loading the affected area. Function comes before aesthetics. Pain stops the set immediately \u2014 that's non-negotiable. Discomfort during rehab exercises is workable; sharp or shooting pain is not. When in doubt, refer out to a physical therapist or doctor \u2014 knowing when to refer is a sign of expertise, not weakness."}
]},
{t:"MOBILITY",items:[
{t:"When to Prioritize Mobility",d:"If range of motion is significantly restricted in a movement pattern they need, address it before loading that pattern. Mobility work isn't a time-filler \u2014 it's a prerequisite for safe, effective training."},
{t:"PNF Stretching",d:"The harder the contraction phase, the better the subsequent stretch response. Extend holds to 5-7 seconds for particularly tight areas. Alternate sides to identify bilateral differences that might indicate compensation patterns."},
{t:"Before vs After Training",d:"Before: dynamic movements only. No prolonged static holds pre-workout (it temporarily reduces force production). After: both static and PNF stretching are ideal \u2014 muscles are warm and most receptive to lengthening."},
{t:"Programming Frequency",d:"Minimum effective dose: 1x/week dedicated mobility. Sweet spot: 2-3x/week. For identified imbalances: double the hold duration on the tighter side until symmetry improves."}
]},
{t:"NUTRITION",items:[
{t:"The Foundation",d:"Nutrition drives body composition. Training amplifies it. Start with one well-constructed meal per day that they genuinely enjoy eating. Build from there. Sustainability beats perfection every time."},
{t:"Hydration",d:"Muscle tissue is roughly 80% water. Dehydrated muscle underperforms and is more injury-prone. Minimum: water before, during, and after every session. Encourage them to track intake for one week \u2014 most people are surprised how little they actually drink."},
{t:"Practical Supplement Guidance",d:"Creatine monohydrate: 5g/day, well-researched, effective. Caffeine: improves workout output. Don't fear carbohydrates \u2014 they're your clients' primary fuel source for training. You have real knowledge here \u2014 share it with confidence."},
{t:"Scope and Confidence",d:"You have valuable expertise in practical nutrition for fitness. You can absolutely help clients build meal plans, understand macros, and make better food choices. If a client has a diagnosed medical condition that requires specialized dietary management, connecting them with a registered dietitian shows professionalism. But for the vast majority of your clients, YOU are more than qualified to guide their nutrition."}
]},
{t:"BUSINESS",items:[
{t:"Professionalism",d:"Arrive before your client. Respond to messages promptly. Follow up after sessions when appropriate. These small things build trust faster than any certification."},
{t:"Revenue Tracking",d:"Log every session. Gym cut (20%) is due within the first 5 days of the following month. Use your business account for all transactions. Track deductible expenses (equipment, continuing education, mileage)."},
{t:"Building Your Client Base",d:"Pour into your current clients \u2014 results create referrals naturally. You can formalize this: 'Refer someone who signs up and you get a free session.' Word of mouth from a transformed client is worth more than any ad."},
{t:"Expanding Your Services",d:"Custom programming, macro guidance, weekly check-ins \u2014 these are services you can offer beyond the gym floor. Price based on scope and your time. Frame it as: 'Let me help you with the other 167 hours of your week.' You have the knowledge to do this. Trust yourself."}
]}

function tryUnlock(){var inp=$("pinInput"),entered=inp?inp.value.trim():"";if(entered===getPIN()){haptic([15,50,15]);unlock();var lk=$("lockScreen");if(lk)lk.remove();$("app").style.display="";render();}else{haptic([50,30,50]);var err=$("pinError");if(err){err.textContent=t("incorrectPIN");setTimeout(function(){err.textContent="";},1500);}if(inp){inp.value="";updatePinDots();inp.focus();inp.style.animation="shakeError 0.4s ease";setTimeout(function(){inp.style.animation="";},500);}}}
