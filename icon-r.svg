<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="50%" stop-color="#08080c"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a87828"/>
      <stop offset="25%" stop-color="#c49838"/>
      <stop offset="50%" stop-color="#d4a44a"/>
      <stop offset="75%" stop-color="#f0cc70"/>
      <stop offset="100%" stop-color="#c49838"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0cc70"/>
      <stop offset="40%" stop-color="#d4a44a"/>
      <stop offset="100%" stop-color="#a87828"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="1.5"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.15"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
    <radialGradient id="glowBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(212,164,74,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>
  <!-- Ambient glow -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#glowBg)"/>
  <!-- Border -->
  <rect x="2" y="2" width="508" height="508" rx="94" ry="94" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>
  <!-- Inner border highlight -->
  <rect x="6" y="6" width="500" height="500" rx="90" ry="90" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.15"/>
  <!-- Corner accents -->
  <line x1="40" y1="40" x2="40" y2="70" stroke="#d4a44a" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="40" x2="70" y2="40" stroke="#d4a44a" stroke-width="1.5" opacity="0.5"/>
  <line x1="472" y1="40" x2="472" y2="70" stroke="#d4a44a" stroke-width="1.5" opacity="0.5"/>
  <line x1="472" y1="40" x2="442" y2="40" stroke="#d4a44a" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="472" x2="40" y2="442" stroke="#d4a44a" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="472" x2="70" y2="472" stroke="#d4a44a" stroke-width="1.5" opacity="0.5"/>
  <line x1="472" y1="472" x2="472" y2="442" stroke="#d4a44a" stroke-width="1.5" opacity="0.5"/>
  <line x1="472" y1="472" x2="442" y2="472" stroke="#d4a44a" stroke-width="1.5" opacity="0.5"/>
  <!-- R Letter with glow -->
  <text x="256" y="310" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-size="240" font-weight="900" fill="url(#letterGrad)" filter="url(#glow)" letter-spacing="0.02em">R</text>
  <!-- Decorative line -->
  <line x1="160" y1="380" x2="352" y2="380" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  <!-- COACHING STUDIO text -->
  <text x="256" y="410" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="18" font-weight="700" fill="#d4a44a" letter-spacing="0.35em" opacity="0.7">COACHING STUDIO</text>
</svg>